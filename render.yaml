services:
  - type: web
    name: pranexusai
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # set manually in Render dashboard
      - key: GMAIL_USER
        sync: false   # set manually in Render dashboard
      - key: GMAIL_PASSWORD
        sync: false   # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false   # set to your Render service URL e.g. https://pranexusai.onrender.com
